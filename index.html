<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SnaFrate — Coming Soon</title>

<!-- Favicon / Logo -->
<link rel="icon" type="image/png" href="/assets/images/logo.png"/>
<link rel="apple-touch-icon" href="/assets/images/logo.png"/>

<!-- Open Graph / WhatsApp preview -->
<meta property="og:type"        content="website"/>
<meta property="og:url"         content="https://snafrate.com"/>
<meta property="og:title"       content="SnaFrate — Coming Soon"/>
<meta property="og:description" content="Ghana's wholesale marketplace. Shop bulk, import direct from China. Launching soon."/>
<meta property="og:image"       content="https://snafrate.com/assets/images/og-preview.png"/>

<!-- Twitter/X -->
<meta name="twitter:card"        content="summary_large_image"/>
<meta name="twitter:title"       content="SnaFrate — Coming Soon"/>
<meta name="twitter:description" content="Ghana's wholesale marketplace. Launching soon."/>
<meta name="twitter:image"       content="https://snafrate.com/assets/images/og-preview.png"/>
</head>
<body>

<canvas id="c"></canvas>
<div class="grain"></div>

<div class="stage">

  <div class="logo">SnaFrate</div>

  <div class="pill">
    <div class="pill-dot"></div>
    Something big is coming
  </div>

  <h1 class="headline">
    Shop Wholesale.<br/>
    <span class="outline">Ship Anywhere.</span>
  </h1>

  <p class="sub">
    Ghana's wholesale marketplace — connecting buyers with local suppliers and factories in China.
  </p>

  <div class="notify">
    <input type="email" id="email-input" placeholder="Enter your email for early access" autocomplete="email"/>
    <button id="notify-btn" onclick="handleNotify()">Notify Me</button>
  </div>

  <div class="icons-row">
    <div class="icon-chip">
      <div class="icon-wrap">📦</div>
      <span class="icon-label">Bulk</span>
    </div>
    <div class="icon-chip">
      <div class="icon-wrap">🛡️</div>
      <span class="icon-label">Secure</span>
    </div>
    <div class="icon-chip">
      <div class="icon-wrap">🇬🇭</div>
      <span class="icon-label">Ghana</span>
    </div>
    <div class="icon-chip">
      <div class="icon-wrap">🚢</div>
      <span class="icon-label">Import</span>
    </div>
    <div class="icon-chip">
      <div class="icon-wrap">💰</div>
      <span class="icon-label">Savings</span>
    </div>
  </div>

</div>

<div class="footer">
  &copy; 2026 <span>SnaFrate Ltd.</span> &mdash; All rights reserved.
</div>

<div id="toast"></div>

<script src="assets/js/canvas.js"></script>
<script src="assets/js/notify.js"></script>
</body>
</html>
