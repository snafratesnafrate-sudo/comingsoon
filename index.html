<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SnaFrate — Coming Soon</title>
<meta name="description" content="Ghana's wholesale marketplace — connecting buyers with local suppliers and factories in China. Coming soon."/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>

<canvas id="c"></canvas>
<div class="grain"></div>

<div class="stage">

  <div class="logo">SnaFrate</div>

  <div class="pill">
    <div class="pill-dot"></div>
    Something big is coming
  </div>

  <h1 class="headline">
    Shop Wholesale.<br/>
    <span class="outline">Ship Anywhere.</span>
  </h1>

  <p class="sub">
    Ghana's wholesale marketplace — connecting buyers with local suppliers and factories in China.
  </p>

  <div class="notify">
    <input type="email" id="email-input" placeholder="Enter your email for early access" autocomplete="email"/>
    <button id="notify-btn" onclick="handleNotify()">Notify Me</button>
  </div>

  <div class="icons-row">
    <div class="icon-chip">
      <div class="icon-wrap">📦</div>
      <span class="icon-label">Bulk</span>
    </div>
    <div class="icon-chip">
      <div class="icon-wrap">🛡️</div>
      <span class="icon-label">Secure</span>
    </div>
    <div class="icon-chip">
      <div class="icon-wrap">🇬🇭</div>
      <span class="icon-label">Ghana</span>
    </div>
    <div class="icon-chip">
      <div class="icon-wrap">🚢</div>
      <span class="icon-label">Import</span>
    </div>
    <div class="icon-chip">
      <div class="icon-wrap">💰</div>
      <span class="icon-label">Savings</span>
    </div>
  </div>

</div>

<div class="footer">
  &copy; 2026 <span>SnaFrate Ltd.</span> &mdash; All rights reserved.
</div>

<div id="toast"></div>

<script src="assets/js/canvas.js"></script>
<script src="assets/js/notify.js"></script>
</body>
</html>
